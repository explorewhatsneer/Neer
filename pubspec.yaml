name: neer
description: A new Flutter project.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Dil Desteği (SDK'dan gelir)
  flutter_localizations:
    sdk: flutter

  # Tema ve Dil Yönetimi
  shared_preferences: ^2.2.2
  flutter_map_marker_cluster: ^1.3.3
  # İkonlar
  cupertino_icons: ^1.0.2

  # State Management
  provider: ^6.1.2

  # Navigation
  go_router: ^14.2.0

  # Supabase
  supabase_flutter: ^2.8.0

  # Push Notifications (FCM)
  firebase_core: ^3.8.1
  firebase_messaging: ^15.2.1

  # 🔥 GÜNCELLENDİ: Hata veren kısım burasıydı.
  # SDK 0.20.2 istiyor, biz de ^0.20.0 diyerek buna izin veriyoruz.
  intl: ^0.20.0
  
  image_picker: ^1.2.1
  url_launcher: ^6.2.5

  # Harita ve Konum
  flutter_map: ^6.1.0
  latlong2: ^0.9.1
  geolocator: ^13.0.0
  connectivity_plus: ^7.0.0
  cached_network_image: ^3.4.1
  flutter_staggered_grid_view: ^0.7.0


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  mockito: ^5.6.3
  build_runner: ^2.12.2

flutter:
  uses-material-design: true

  

  fonts:
    - family: SFPro
      fonts:
        - asset: assets/fonts/SF-Pro-Display-Regular.otf
          weight: 400
        - asset: assets/fonts/SF-Pro-Display-Medium.otf
          weight: 500
        - asset: assets/fonts/SF-Pro-Display-Semibold.otf
          weight: 600
        - asset: assets/fonts/SF-Pro-Display-Bold.otf
          weight: 700
        - asset: assets/fonts/SF-Pro-Display-Heavy.otf
          weight: 800